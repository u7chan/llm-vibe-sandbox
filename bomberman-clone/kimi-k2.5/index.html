<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomberman Clone</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: monospace;
        }
        canvas {
            border: 2px solid #444;
            background: #000;
        }
        #ui {
            color: #fff;
            margin-top: 10px;
            font-size: 14px;
        }
        #message {
            color: #ff0;
            margin-top: 10px;
            font-size: 18px;
            height: 24px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="480" height="416"></canvas>
    <div id="ui">敵: <span id="enemies">4</span> | 火力: <span id="fire">3</span> | 爆弾: <span id="bombs">1</span></div>
    <div id="message"></div>
    <script src="game.js"></script>
</body>
</html>
